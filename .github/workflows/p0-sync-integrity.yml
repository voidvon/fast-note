name: P0 Sync Integrity

on:
  pull_request:
    paths:
      - src/**
      - tests/**
      - package.json
      - package-lock.json
      - .github/workflows/p0-sync-integrity.yml
  push:
    branches:
      - main
      - master

jobs:
  p0-sync-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P0 sync integrity suite
        run: npm run test:p0:sync-integrity

      - name: Build
        run: npm run build
