name: CI And Dev Deploy

on:
  pull_request:
    paths:
      - backend/**
      - fastnote/**
      - scripts/**
      - package.json
      - .github/workflows/p0-sync-integrity.yml
  push:
    branches:
      - main
      - master
    paths:
      - backend/**
      - fastnote/**
      - scripts/**
      - package.json
      - .github/workflows/p0-sync-integrity.yml
  workflow_dispatch:

concurrency:
  group: dev-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fastnote/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install frontend dependencies
        run: npm ci
        working-directory: fastnote

      - name: Run P0 sync integrity suite
        run: npm run test:p0:sync-integrity
        working-directory: fastnote

      - name: Build application
        run: npm run build

  deploy-dev:
    name: Deploy Dev Via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fastnote/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install frontend dependencies
        run: npm ci
        working-directory: fastnote

      - name: Build Linux release package
        env:
          RELEASE_VERSION: dev-${{ github.sha }}
        run: |
          npm run release -- --target=linux-amd64 --version="${RELEASE_VERSION}" --output-dir=build/releases/dev --no-archive
          tar -C build/releases/dev -czf "build/releases/dev/fastnote_${RELEASE_VERSION}_linux_amd64.tar.gz" "fastnote_${RELEASE_VERSION}_linux_amd64"

      - name: Prepare SSH
        env:
          DEV_DEPLOY_HOST: ${{ vars.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ vars.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_SSH_KEY: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
          DEV_DEPLOY_KNOWN_HOSTS: ${{ secrets.DEV_DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "${DEV_DEPLOY_HOST}"
          test -n "${DEV_DEPLOY_SSH_KEY}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEV_DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -n "${DEV_DEPLOY_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${DEV_DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEV_DEPLOY_PORT:-22}" "${DEV_DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Upload release bundle
        env:
          DEV_DEPLOY_HOST: ${{ vars.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ vars.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_USER: ${{ vars.DEV_DEPLOY_USER }}
          RELEASE_VERSION: dev-${{ github.sha }}
        run: |
          test -n "${DEV_DEPLOY_USER}"

          PACKAGE_NAME="fastnote_${RELEASE_VERSION}_linux_amd64"
          PACKAGE_ARCHIVE="build/releases/dev/${PACKAGE_NAME}.tar.gz"
          scp -P "${DEV_DEPLOY_PORT:-22}" "${PACKAGE_ARCHIVE}" "${DEV_DEPLOY_USER}@${DEV_DEPLOY_HOST}:/tmp/${PACKAGE_NAME}.tar.gz"

      - name: Deploy on remote host
        env:
          DEV_DEPLOY_HOST: ${{ vars.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ vars.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_USER: ${{ vars.DEV_DEPLOY_USER }}
          DEV_DEPLOY_BASE_DIR: ${{ vars.DEV_DEPLOY_BASE_DIR }}
          DEV_DEPLOY_PROJECT_NAME: ${{ vars.DEV_DEPLOY_PROJECT_NAME }}
          RELEASE_VERSION: dev-${{ github.sha }}
        run: |
          test -n "${DEV_DEPLOY_BASE_DIR}"
          test -n "${DEV_DEPLOY_PROJECT_NAME}"

          PACKAGE_NAME="fastnote_${RELEASE_VERSION}_linux_amd64"

          ssh -p "${DEV_DEPLOY_PORT:-22}" "${DEV_DEPLOY_USER}@${DEV_DEPLOY_HOST}" \
            "PACKAGE_NAME='${PACKAGE_NAME}' DEPLOY_BASE_DIR='${DEV_DEPLOY_BASE_DIR}' DEPLOY_PROJECT_NAME='${DEV_DEPLOY_PROJECT_NAME}' bash -s" <<'EOF'
          set -euo pipefail

          RELEASES_DIR="${DEPLOY_BASE_DIR}/releases"
          SHARED_DIR="${DEPLOY_BASE_DIR}/shared"
          CURRENT_LINK="${DEPLOY_BASE_DIR}/current"
          PACKAGE_FILE="/tmp/${PACKAGE_NAME}.tar.gz"
          TARGET_DIR="${RELEASES_DIR}/${PACKAGE_NAME}"
          PROJECT_DIR="/www/wwwroot/${DEPLOY_PROJECT_NAME}"
          START_SCRIPT="/www/server/go_project/vhost/scripts/${DEPLOY_PROJECT_NAME}.sh"
          PID_FILE="/var/tmp/gopids/${DEPLOY_PROJECT_NAME}.pid"
          COMMAND_PATTERN="${PROJECT_DIR}/fastnote serve --http=0.0.0.0:8888"

          if [ "${DEPLOY_BASE_DIR}" = "${PROJECT_DIR}" ]; then
            echo "DEV_DEPLOY_BASE_DIR must not equal PROJECT_DIR (${PROJECT_DIR})"
            exit 1
          fi

          mkdir -p "${RELEASES_DIR}" "${SHARED_DIR}/pb_data"
          rm -rf "${TARGET_DIR}"
          tar -xzf "${PACKAGE_FILE}" -C "${RELEASES_DIR}"
          rm -rf "${PROJECT_DIR}"
          mkdir -p "${PROJECT_DIR}"
          cp -a "${TARGET_DIR}/." "${PROJECT_DIR}/"
          rm -rf "${PROJECT_DIR}/pb_data"
          ln -sfn "${SHARED_DIR}/pb_data" "${PROJECT_DIR}/pb_data"
          chown -R www:www "${PROJECT_DIR}"
          chmod +x "${PROJECT_DIR}/fastnote"
          ln -sfn "${TARGET_DIR}" "${CURRENT_LINK}"

          if [ -f "${PID_FILE}" ]; then
            kill "$(cat "${PID_FILE}")" 2>/dev/null || true
            rm -f "${PID_FILE}"
          fi
          pkill -f "${COMMAND_PATTERN}" 2>/dev/null || true
          sleep 2
          su -s /bin/bash -c "${START_SCRIPT}" www

          for _ in $(seq 1 10); do
            if [ -f "${PID_FILE}" ] && ps -p "$(cat "${PID_FILE}")" >/dev/null 2>&1; then
              rm -f "${PACKAGE_FILE}"
              exit 0
            fi
            sleep 1
          done

          echo "fastnote project failed to start"
          exit 1

          rm -f "${PACKAGE_FILE}"
          EOF
