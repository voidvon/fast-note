name: P0 Sync Integrity

on:
  pull_request:
    paths:
      - fastnote/src/**
      - fastnote/tests/**
      - fastnote/package.json
      - fastnote/package-lock.json
      - fastnote/vite.config.ts
      - .github/workflows/p0-sync-integrity.yml
  push:
    branches:
      - main
      - master

jobs:
  p0-sync-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fastnote/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: fastnote

      - name: Run P0 sync integrity suite
        run: npm run test:p0:sync-integrity
        working-directory: fastnote

      - name: Build
        run: npm run build
        working-directory: fastnote
